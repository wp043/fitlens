name: Deterministic soak

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: Pure workflow iterations
        required: false
        default: "1000"
  schedule:
    - cron: "23 7 * * 0"

permissions:
  contents: read

jobs:
  soak:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SOAK_ITERATIONS: ${{ inputs.iterations || '1000' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.22.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22.22.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run deterministic pure-workflow soak
        run: pnpm test:soak -- --iterations "$SOAK_ITERATIONS" --progress-every 250

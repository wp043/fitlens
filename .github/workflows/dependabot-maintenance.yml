name: Dependabot maintenance

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: dependabot-maintenance-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  maintain:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0].number != null
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      RUN_ID: ${{ github.event.workflow_run.id }}
      RUN_URL: ${{ github.event.workflow_run.html_url }}
    steps:
      - name: Verify Dependabot pull request
        id: verify
        shell: bash
        run: |
          set -euo pipefail

          pr_json="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}")"
          author="$(jq -r '.user.login' <<<"${pr_json}")"
          base_ref="$(jq -r '.base.ref' <<<"${pr_json}")"
          head_repo="$(jq -r '.head.repo.full_name' <<<"${pr_json}")"
          head_ref="$(jq -r '.head.ref' <<<"${pr_json}")"
          head_sha="$(jq -r '.head.sha' <<<"${pr_json}")"
          state="$(jq -r '.state' <<<"${pr_json}")"

          if [[ "${author}" != "dependabot[bot]" || "${base_ref}" != "main" || "${head_repo}" != "${REPOSITORY}" || "${head_ref}" != dependabot/* || "${state}" != "open" ]]; then
            echo "eligible=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${head_sha}" != "${RUN_HEAD_SHA}" ]]; then
            echo "The CI result is stale for ${head_sha}; a newer run will handle it."
            echo "eligible=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          mapfile -t commit_authors < <(
            gh api --paginate "repos/${REPOSITORY}/pulls/${PR_NUMBER}/commits" \
              --jq '.[] | .author.login // ""'
          )
          if (( ${#commit_authors[@]} == 0 )); then
            echo "eligible=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          for commit_author in "${commit_authors[@]}"; do
            if [[ "${commit_author}" != "dependabot[bot]" ]]; then
              echo "Rejecting a dependency PR with a non-Dependabot commit."
              echo "eligible=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          done

          mapfile -t changed_files < <(
            gh api --paginate "repos/${REPOSITORY}/pulls/${PR_NUMBER}/files" \
              --jq '.[].filename'
          )
          if (( ${#changed_files[@]} == 0 )); then
            echo "eligible=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          for changed_file in "${changed_files[@]}"; do
            if [[ "${head_ref}" == dependabot/npm_and_yarn/* ]]; then
              if [[ "${changed_file}" != "package.json" && "${changed_file}" != "pnpm-lock.yaml" ]]; then
                echo "Rejecting an npm update that changes ${changed_file}."
                echo "eligible=false" >> "${GITHUB_OUTPUT}"
                exit 0
              fi
            elif [[ "${head_ref}" == dependabot/github_actions/* ]]; then
              if [[ "${changed_file}" != .github/workflows/*.yml && "${changed_file}" != .github/workflows/*.yaml ]]; then
                echo "Rejecting an Actions update that changes ${changed_file}."
                echo "eligible=false" >> "${GITHUB_OUTPUT}"
                exit 0
              fi
            else
              echo "eligible=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          done

          title="$(jq -r '.title' <<<"${pr_json}")"
          auto_merge=false

          if [[ "${title}" == *"production group"* || "${title}" == *"development group"* || "${title}" == *"actions group"* ]]; then
            auto_merge=true
          elif [[ "${title}" =~ from[[:space:]]+v?([0-9]+)([^[:space:]]*)[[:space:]]+to[[:space:]]+v?([0-9]+) ]]; then
            if [[ "${BASH_REMATCH[1]}" == "${BASH_REMATCH[3]}" ]]; then
              auto_merge=true
            fi
          fi

          echo "eligible=true" >> "${GITHUB_OUTPUT}"
          echo "auto_merge=${auto_merge}" >> "${GITHUB_OUTPUT}"

      - name: Retry one failed CI attempt
        if: >-
          steps.verify.outputs.eligible == 'true' &&
          (github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'timed_out') &&
          github.event.workflow_run.run_attempt == 1
        shell: bash
        run: gh run rerun "${RUN_ID}" --failed --repo "${REPOSITORY}"

      - name: Report persistent CI failure
        if: >-
          steps.verify.outputs.eligible == 'true' &&
          github.event.workflow_run.conclusion != 'success' &&
          (github.event.workflow_run.run_attempt > 1 ||
          (github.event.workflow_run.conclusion != 'failure' && github.event.workflow_run.conclusion != 'timed_out'))
        shell: bash
        run: |
          gh label create "dependencies:needs-fix" --repo "${REPOSITORY}" --force \
            --color "D93F0B" --description "Dependency update needs a code migration"
          gh pr edit "${PR_NUMBER}" --repo "${REPOSITORY}" \
            --add-label "dependencies:needs-fix"
          echo "Dependabot maintenance retried CI, but the checks still failed: ${RUN_URL}"

      - name: Refresh an outdated dependency branch
        id: refresh
        if: >-
          steps.verify.outputs.eligible == 'true' &&
          steps.verify.outputs.auto_merge == 'true' &&
          github.event.workflow_run.conclusion == 'success'
        shell: bash
        run: |
          set -euo pipefail

          mergeable_state=unknown
          for _attempt in 1 2 3 4 5; do
            pr_json="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}")"
            mergeable_state="$(jq -r '.mergeable_state' <<<"${pr_json}")"
            if [[ "${mergeable_state}" != "unknown" && "$(jq -r '.mergeable' <<<"${pr_json}")" != "null" ]]; then
              break
            fi
            sleep 3
          done

          if [[ "${mergeable_state}" == "behind" ]]; then
            gh pr comment "${PR_NUMBER}" --repo "${REPOSITORY}" --body "@dependabot rebase"
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${mergeable_state}" == "dirty" ]]; then
            gh pr comment "${PR_NUMBER}" --repo "${REPOSITORY}" --body "@dependabot rebase"
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${mergeable_state}" == "unknown" ]]; then
            gh pr comment "${PR_NUMBER}" --repo "${REPOSITORY}" --body "@dependabot rebase"
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "$(jq -r '.mergeable' <<<"${pr_json}")" != "true" ]]; then
            echo "Pull request mergeability is not ready; waiting for the next CI run."
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "ready=true" >> "${GITHUB_OUTPUT}"

      - name: Leave major updates for agent review
        if: >-
          steps.verify.outputs.eligible == 'true' &&
          steps.verify.outputs.auto_merge != 'true' &&
          github.event.workflow_run.conclusion == 'success'
        shell: bash
        run: |
          gh label create "dependencies:agent-review" --repo "${REPOSITORY}" --force \
            --color "6F42C1" --description "Major dependency update awaiting agent review"
          gh pr edit "${PR_NUMBER}" --repo "${REPOSITORY}" \
            --add-label "dependencies:agent-review"

      - name: Merge the verified dependency update
        if: >-
          steps.verify.outputs.eligible == 'true' &&
          steps.verify.outputs.auto_merge == 'true' &&
          github.event.workflow_run.conclusion == 'success' &&
          steps.refresh.outputs.ready == 'true'
        shell: bash
        run: |
          title="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.title')"
          gh api --method PUT \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/merge" \
            -f sha="${RUN_HEAD_SHA}" \
            -f merge_method=merge \
            -f commit_title="${title}" \
            -f commit_message="Automatically merged after the complete CI matrix passed."
